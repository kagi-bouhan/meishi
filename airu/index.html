<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>まるっとアイル</title>

<!-- PWA / ホーム画面アイコン設定 -->
<link rel="manifest" href="app.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="まるっとアイル">
<meta name="theme-color" content="#ffffff">

<!-- ホーム画面に追加したときのアイコン（キーのロゴ・同フォルダ） -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
  html,body{margin:0;height:100%;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#fff;color:#333}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;box-sizing:border-box;text-align:center}
  .logo{width:96px;height:96px}
  .msg{font-size:15px;color:#666}
  .btn{margin-top:6px;display:inline-block;padding:12px 22px;border-radius:10px;background:#1565ff;color:#fff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="icon-192.png" alt="まるっとアイル">
  <div class="msg">まるっとアイルを開いています…</div>
  <a class="btn" id="open" href="#">開かないときはこちら</a>
</div>

<script>
  // まるっとアイル（AppSheet）アプリ本体URL
  var APP_URL = "https://www.appsheet.com/start/a0b249fc-5dad-4888-a495-deab992bb325";
  document.getElementById("open").href = APP_URL;
  location.replace(APP_URL);
</script>
</body>
</html>
